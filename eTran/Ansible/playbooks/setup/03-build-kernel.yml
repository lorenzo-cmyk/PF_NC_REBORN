---
- name: eTran node setup — configure, compile and install kernel
  hosts: all
  tasks:
    - name: Copy verified kernel .config to build tree
      ansible.builtin.copy:
        src: /home/lorenzo/repos/PF_NC_REBORN/eTran/Ansible/files/kernel-config
        dest: /local/eTran-linux/.config
        owner: "{{ ansible_user }}"
        mode: "0644"
      become: true

    - name: Check if kernel is already compiled
      ansible.builtin.stat:
        path: /local/eTran-linux/vmlinux
      register: kernel_compiled

    - name: Compile kernel (async, may take a while)
      ansible.builtin.shell:
        cmd: yes "" | make -j$(nproc)
        chdir: /local/eTran-linux
      become: true
      become_user: "{{ ansible_user }}"
      async: 7200
      poll: 30
      when: not kernel_compiled.stat.exists

    - name: Check if kernel modules are installed
      ansible.builtin.stat:
        path: /lib/modules/6.6.0-eTran+/modules.dep
      register: modules_installed

    - name: Install kernel modules
      become: true
      ansible.builtin.shell:
        cmd: make modules_install -j$(nproc)
        chdir: /local/eTran-linux
      when: not modules_installed.stat.exists

    - name: Check if kernel is installed
      ansible.builtin.stat:
        path: /boot/vmlinuz-6.6.0-eTran+
      register: kernel_installed

    - name: Install kernel
      become: true
      ansible.builtin.shell:
        cmd: make install -j$(nproc)
        chdir: /local/eTran-linux
      when: not kernel_installed.stat.exists

    - name: Check if kernel headers are installed
      ansible.builtin.stat:
        path: /local/eTran-linux/.eTran-headers-installed
      register: headers_installed

    - name: Install kernel headers
      become: true
      ansible.builtin.shell:
        cmd: make headers_install INSTALL_HDR_PATH=/usr && touch /local/eTran-linux/.eTran-headers-installed
        chdir: /local/eTran-linux
      when: not headers_installed.stat.exists
