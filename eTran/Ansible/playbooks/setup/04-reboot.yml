---
- name: eTran node setup — reboot to new kernel
  hosts: all
  become: true
  tasks:
    - name: Reboot all nodes
      ansible.builtin.reboot:
        reboot_timeout: 600

    - name: Verify kernel version is 6.6
      ansible.builtin.command: uname -r
      register: kernel_version
      failed_when: "'6.6' not in kernel_version.stdout"

    - name: Report kernel version
      ansible.builtin.debug:
        msg: "Running kernel: {{ kernel_version.stdout }}"
