---
- name: eTran evaluation — set MTU (default 1500, no-op unless overridden)
  hosts: all
  become: true
  gather_facts: false
  vars:
    mtu: 1500
    iface: ens1f1np1
  tasks:
    - name: Set MTU on primary interface
      ansible.builtin.command:
        cmd: ip link set {{ iface }} mtu {{ mtu }}
      changed_when: false
      failed_when: false
