---
- name: eTran evaluation — set NIC queue count and pin IRQs to physical cores
  hosts: all
  become: true
  gather_facts: false
  vars:
    iface: ens1f1np1
    # With HT on, there are 20 logical CPUs (0-19). Cores 10-19 are SMT
    # siblings of physical cores 0-9. eTran pins the microkernel control_loop
    # to core 19 (defs.h CP_CPU=19) — a logical sibling. To match the paper's
    # isolation model, pin IRQs to PHYSICAL cores 0-9 only and keep 10 NIC
    # queues (queue i -> physical core i). Leave core 19 free for mk.
    nr_queues: 10
  tasks:
    - name: Count physical cores (cores with a thread sibling list of size 1 exclusive)
      ansible.builtin.shell:
        cmd: |
          # Topology: cores 0-9 are physical, 10-19 are their SMT siblings.
          # Determine the set of physical (lowest thread_id per core) CPUs.
          awk -F, '/^core id/ {next} /^processor/ {p=$2; next}
                  /^core id/ {core=$2; next}
                  /^physical id/ {next}
                  END {print ""}
                  ' /proc/cpuinfo >/dev/null 2>&1
          # Simpler: cores 0..(<threads/2>-1) are the physical IDs on this xl170.
          total=$(nproc)
          phys=$((total / 2))
          seq 0 $((phys - 1))
      register: core_list
      changed_when: false

    - name: Show detected core layout
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: total CPUs={{ ansible_facts['processor_vcpus'] | default('nproc') }}, pinning IRQs to cores {{ core_list.stdout_lines | join(',') }}"

    - name: Set NIC queue count ({{ nr_queues }})
      ansible.builtin.command:
        cmd: ethtool -L {{ iface }} combined {{ nr_queues }}
      changed_when: false
      failed_when: false

    - name: Get NIC PCI slot
      ansible.builtin.shell:
        cmd: cat /sys/class/net/{{ iface }}/device/uevent | sed -n 's/PCI_SLOT_NAME=//p'
      register: pci_slot
      changed_when: false

    - name: Get NIC IRQ list for correct PCI slot (after queue count change)
      ansible.builtin.shell: |
        pci={{ pci_slot.stdout }}
        grep "mlx5_comp" /proc/interrupts | grep "@pci:$pci" | sed 's/^ *//' | cut -d: -f1 | sort -n | head -n {{ nr_queues }}
      register: irq_list
      changed_when: false

    - name: Abort if IRQ count != queue count
      ansible.builtin.assert:
        that: "irq_list.stdout_lines | length == nr_queues"
        fail_msg: "Expected {{ nr_queues }} IRQs for {{ iface }} (PCI {{ pci_slot.stdout }}), got {{ irq_list.stdout_lines | length }}. Check that grep targets the right mlx5 device."

    - name: Pin each IRQ to its physical core
      ansible.builtin.shell: |
        echo {{ item.0 }} > /proc/irq/{{ item.1 }}/smp_affinity_list
      loop: "{{ core_list.stdout_lines | zip(irq_list.stdout_lines) | list }}"
      changed_when: false

    - name: Show IRQ affinity
      ansible.builtin.shell: |
        for irq in {{ irq_list.stdout_lines | join(' ') }}; do
          core=$(cat /proc/irq/$irq/smp_affinity_list 2>/dev/null)
          echo "IRQ $irq -> core $core"
        done
      register: affinity_result
      changed_when: false

    - name: IRQ affinity map
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }}"
          - "{{ affinity_result.stdout_lines }}"
