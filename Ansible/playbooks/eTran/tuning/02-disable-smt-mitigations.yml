---
- name: eTran node tuning — disable SMT and mitigations via GRUB
  hosts: all
  become: true
  tasks:
    - name: Add nosmt and mitigations=off to GRUB_CMDLINE_LINUX
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX="((?!nosmt|mitigations=off).*)"$'
        line: 'GRUB_CMDLINE_LINUX="\1 nosmt mitigations=off"'
        backrefs: true
      register: grub

    - name: Update GRUB
      ansible.builtin.command:
        cmd: update-grub
      when: grub.changed

    - name: Reboot if GRUB was modified
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: grub.changed

    - name: Verify SMT disabled
      ansible.builtin.shell:
        cmd: cat /sys/devices/system/cpu/smt/control
      register: smt_status
      changed_when: false

    - name: Verify mitigations disabled
      ansible.builtin.shell:
        cmd: cat /proc/cmdline | grep -q "mitigations=off" && echo "disabled" || echo "enabled"
      register: mitigations_status
      changed_when: false

    - name: Status
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }}: SMT={{ smt_status.stdout }}"
          - "{{ inventory_hostname }}: mitigations={{ mitigations_status.stdout }}"
