---
- name: Homa node tuning — boot parameters (HT on, mitigations, C-states, ASPM)
  hosts: all
  become: true
  tasks:
    - name: Check current GRUB_CMDLINE_LINUX
      ansible.builtin.shell:
        cmd: grep '^GRUB_CMDLINE_LINUX=' /etc/default/grub
      register: grub_current
      changed_when: false

    - name: Remove nosmt if present (keep mitigations=off)
      ansible.builtin.shell:
        cmd: |
          if grep -q 'nosmt' /etc/default/grub; then
            sed -i '/^GRUB_CMDLINE_LINUX=/s/ nosmt//g' /etc/default/grub
            echo changed
          else
            echo ok
          fi
      register: grub_smt
      changed_when: grub_smt.stdout == 'changed'

    - name: Add mitigations=off if missing
      ansible.builtin.shell:
        cmd: |
          if grep -q 'mitigations=off' /etc/default/grub; then
            echo ok
          else
            sed -i '/^GRUB_CMDLINE_LINUX=/s/"$/ mitigations=off"/' /etc/default/grub
            echo changed
          fi
      register: grub_mitigations
      changed_when: grub_mitigations.stdout == 'changed'

    - name: Add C-state and ASPM tuning if missing
      ansible.builtin.shell:
        cmd: |
          if grep -q 'intel_idle.max_cstate=0' /etc/default/grub; then
            echo ok
          else
            sed -i '/^GRUB_CMDLINE_LINUX=/s/"$/ intel_idle.max_cstate=0 pcie_aspm=off"/' /etc/default/grub
            echo changed
          fi
      register: grub_cstates
      changed_when: grub_cstates.stdout == 'changed'

    - name: Update GRUB if any params changed
      ansible.builtin.command:
        cmd: update-grub
      when: grub_smt.changed or grub_mitigations.changed or grub_cstates.changed

    - name: Reboot if any params changed
      ansible.builtin.reboot:
        reboot_timeout: 600
      when: grub_smt.changed or grub_mitigations.changed or grub_cstates.changed

    - name: Verify SMT enabled (Hyper-Threading on)
      ansible.builtin.shell:
        cmd: cat /sys/devices/system/cpu/smt/control
      register: smt_status
      changed_when: false

    - name: Verify thread count
      ansible.builtin.shell:
        cmd: |
          echo "threads=$(nproc)"
          echo "threads_per_core=$(lscpu | awk '/^Thread\(s\) per core:/ {print $4}')"
      register: thread_count
      changed_when: false

    - name: Verify mitigations disabled
      ansible.builtin.shell:
        cmd: cat /proc/cmdline | grep -q "mitigations=off" && echo "disabled" || echo "enabled"
      register: mitigations_status
      changed_when: false

    - name: Verify C-states disabled
      ansible.builtin.shell:
        cmd: |
          if grep -q 'intel_idle.max_cstate=0' /proc/cmdline; then
            echo "disabled (intel_idle.max_cstate=0)"
          else
            echo "ENABLED — C-states active"
          fi
      register: cstate_status
      changed_when: false

    - name: Verify ASPM off
      ansible.builtin.shell:
        cmd: |
          if grep -q 'pcie_aspm=off' /proc/cmdline; then
            echo "disabled"
          else
            policy=$(cat /sys/module/pcie_aspm/parameters/policy 2>/dev/null || echo "unknown")
            echo "aspm=$policy"
          fi
      register: aspm_status
      changed_when: false

    - name: Status
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }}: SMT={{ smt_status.stdout }}"
          - "{{ inventory_hostname }}: {{ thread_count.stdout_lines | join(', ') }}"
          - "{{ inventory_hostname }}: mitigations={{ mitigations_status.stdout }}"
          - "{{ inventory_hostname }}: C-states={{ cstate_status.stdout }}"
          - "{{ inventory_hostname }}: ASPM={{ aspm_status.stdout }}"
