---
- name: Homa node setup — release upgrade to Ubuntu 24.04.4 LTS
  hosts: all
  become: true
  vars:
    dpkg_options: "force-confdef,force-confold"

  tasks:
    - name: Check current release
      ansible.builtin.command: lsb_release -rs
      register: current_release
      changed_when: false

    - name: Pre-upgrade steps (skipped if already on 24.04)
      when: "'24.04' not in current_release.stdout"
      block:
        - name: Always include phased updates (avoid partial-upgrade held-back packages)
          ansible.builtin.copy:
            dest: /etc/apt/apt.conf.d/99-always-include-phased-updates
            content: |
              APT::Get::Always-Include-Phased-Updates "true";
            mode: "0644"

        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true

        - name: Force-upgrade dkms (commonly held back, blocks do-release-upgrade precheck)
          ansible.builtin.apt:
            name: dkms
            state: latest
            force: true
            dpkg_options: "{{ dpkg_options }}"
          environment:
            DEBIAN_FRONTEND: noninteractive

        - name: Full upgrade of current release (required before release upgrade)
          ansible.builtin.apt:
            upgrade: dist
            dpkg_options: "{{ dpkg_options }}"
            autoremove: true
          environment:
            DEBIAN_FRONTEND: noninteractive

        - name: Install update-manager-core (provides do-release-upgrade)
          ansible.builtin.apt:
            name: update-manager-core
            state: present

        - name: Allow upgrading to the next LTS
          ansible.builtin.lineinfile:
            path: /etc/update-manager/release-upgrades
            regexp: '^Prompt='
            line: 'Prompt=lts'

        - name: Run do-release-upgrade to 24.04 (async, takes a long time)
          ansible.builtin.shell:
            cmd: do-release-upgrade -f DistUpgradeViewNonInteractive
          environment:
            DEBIAN_FRONTEND: noninteractive
          async: 5400
          poll: 30

    - name: Verify release version
      ansible.builtin.command: lsb_release -rs
      register: new_release
      changed_when: false
      failed_when: "'24.04' not in new_release.stdout"

    - name: Update apt cache (post-upgrade)
      ansible.builtin.apt:
        update_cache: true

    - name: Install HWE kernel for 24.04
      ansible.builtin.apt:
        name: linux-generic-hwe-24.04
        state: present
        install_recommends: true

    - name: Report release and kernel version
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: Ubuntu {{ new_release.stdout }}"
