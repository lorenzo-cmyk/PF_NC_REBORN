---
- name: Homa node setup — clone source repositories
  hosts: all
  tasks:
    - name: Create /local owned by the ansible user
      become: true
      ansible.builtin.file:
        path: /local
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: Check if Linux kernel source is already cloned
      ansible.builtin.stat:
        path: /local/linux/.git
      register: linux_repo

    - name: Clone vanilla Linux kernel source (v6.17.8)
      ansible.builtin.git:
        repo: https://github.com/gregkh/linux
        dest: /local/linux
        version: v6.17.8
        depth: 1
      become: true
      become_user: "{{ ansible_user }}"
      when: not linux_repo.stat.exists

    - name: Check if HomaModule is already cloned
      ansible.builtin.stat:
        path: /local/HomaModule/.git
      register: homamodule_repo

    - name: Clone HomaModule (tracks kernel 6.17.8)
      ansible.builtin.git:
        repo: https://github.com/PlatformLab/HomaModule
        dest: /local/HomaModule
        version: main
      become: true
      become_user: "{{ ansible_user }}"
      when: not homamodule_repo.stat.exists
